name: Deploy Expo Web

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/smiil3/mds-mdp-front
  K8S_NAMESPACE: frontend
  DEPLOYMENT_NAME: frontend-app
  CONTAINER_NAME: frontend-app
  EXPO_PUBLIC_API_URL: http://192.162.68.34:30122

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: secrets-b

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            EXPO_PUBLIC_API_URL=${{ env.EXPO_PUBLIC_API_URL }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Copy Kubernetes manifests to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "k8s"
          target: "/root/frontend-app"

      - name: Deploy to K3s
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            kubectl create namespace ${{ env.K8S_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

            kubectl apply -f /root/frontend-app/k8s/deployment.yaml
            kubectl apply -f /root/frontend-app/k8s/service.yaml
            kubectl apply -f /root/frontend-app/k8s/ingress.yaml

            kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
              ${{ env.CONTAINER_NAME }}=${{ env.IMAGE_NAME }}:${{ github.sha }} \
              -n ${{ env.K8S_NAMESPACE }}

            kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
              -n ${{ env.K8S_NAMESPACE }}

            kubectl get pods -n ${{ env.K8S_NAMESPACE }}